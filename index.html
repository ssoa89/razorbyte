<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RazorByte | Agilidade Digital</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
    <section>
        <a href="#" class="logo">
            <img src="imagi/1000174453-removebg-preview.png" alt="Logo">
        </a>
        <nav class="navbar">
            <a href="#home">Home</a>
            <a href="#about">Sobre</a>
            <a href="#review">Avaliações</a>
            <a href="#address">Endereço</a>
            <a href="#login">Login</a>
        </nav>
    </section>
</header>

<main>
    <section class="home-container0" id="home">
        <div class="hero-text-box">
            <h1 class="magical-text">RAZOR BYTE</h1>
            <h2 id="typing">agilidade natural, precisão digital</h2>
        </div>
    </section>

    <section class="about reveal" id="about">
        <h2 class="title">Sobre <span>nós</span></h2>
        <div class="slider">
            <div class="slides">
                <input type="radio" name="radio-btn" id="radio1" checked>
                <input type="radio" name="radio-btn" id="radio2">
                <input type="radio" name="radio-btn" id="radio3">
                <input type="radio" name="radio-btn" id="radio4">

                <div class="slide first"><img src="imagi/2-razorbill-head.jpg"></div>
                <div class="slide"><img src="imagi/nsplsh_5b67e44a947e441ba1fe1e9c765b9b0f~mv2.avif"></div>
                <div class="slide"><img src="imagi/Razorbill_with_a_nice_catch.jpg"></div>
                <div class="slide"><img src="imagi/2-razorbill-head.jpg"></div>
            </div>
            <div class="manual-navigation">
                <label for="radio1" class="manual-btn"></label>
                <label for="radio2" class="manual-btn"></label>
                <label for="radio3" class="manual-btn"></label>
                <label for="radio4" class="manual-btn"></label>
            </div>
        </div>
    </section>

    <section class="destaques">
        <h2 class="title reveal">Conteúdos em <span>destaque</span></h2>
        <div class="cards">
            <div class="card reveal">
                <img src="imagi/nsplsh_5b67e44a947e441ba1fe1e9c765b9b0f~mv2.avif">
                <div class="card-text">
                    <h3>Projetos</h3>
                    <p>O que os líderes fazem de diferente?</p>
                    <a href="#">Saiba mais →</a>
                </div>
            </div>
            <div class="card reveal">
                <img src="imagi/nsplsh_5b67e44a947e441ba1fe1e9c765b9b0f~mv2.avif">
                <div class="card-text">
                    <h3>Cibersegurança</h3>
                    <p>Transforme sua segurança digital</p>
                    <a href="#">Saiba mais →</a>
                </div>
            </div>
        </div>
    </section>

    <section class="login reveal" id="login">
        <div class="login-card">
            <h3>Login <span>Cliente</span></h3>
            <input type="email" placeholder="E-mail">
            <input type="password" placeholder="Senha">
            <button class="btn-login">Entrar</button>
        </div>
    </section>
</main>

<script>
    // 1. CARROSSEL AUTOMÁTICO (FIXED)
    let count = 1;
    setInterval(() => {
        count++;
        if(count > 4) count = 1;
        let radio = document.getElementById("radio" + count);
        if(radio) radio.checked = true;
    }, 4000);

    // 2. REVEAL AO SCROLL (EFEITO CANVA)
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('active');
        });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    // 3. HEADER INTELIGENTE
    const header = document.querySelector(".header");
    document.addEventListener("mousemove", (e) => {
        if(e.clientY < 60) header.classList.add("header-visible");
        else header.classList.remove("header-visible");
    });

    // 4. EFEITO TILT NO TÍTULO
    const box = document.querySelector(".hero-text-box");
    box.addEventListener("mousemove", (e) => {
        const { x, y, width, height } = box.getBoundingClientRect();
        const rotX = (height / 2 - (e.clientY - y)) / 10;
        const rotY = ((e.clientX - x) - width / 2) / 10;
        box.style.transform = `perspective(1000px) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
    });
    box.addEventListener("mouseleave", () => {
        box.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
    });
</script>
<script>
    // 1. CARROSSEL (MESMA LÓGICA)
    let count1 = 1;
    setInterval(() => {
        count1++;
        if(count1 > 4) count1 = 1;
        let radio = document.getElementById("radio" + count1);
        if(radio) radio.checked = true;
    }, 4000);

    // 2. REVEAL AO SCROLL (EFEITO CANVA)
    const observer1 = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('active');
        });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer1.observe(el));

    // 3. SUA NAVBAR (APARECE NO TOPO / SOME NO SCROLL)
    const header1 = document.querySelector(".header");
    
    // Mostra se o mouse estiver no topo (Y < 60)
    document.addEventListener("mousemove", (e) => {
        if(e.clientY < 60) {
            header1.style.top = "0";
        } else if (window.scrollY > 100) { 
            // Só esconde se o usuário já tiver rolado um pouco a página
            header1.style.top = "-100px";
        }
    });

    // Garante que ela apareça se o usuário subir a página toda
    window.addEventListener("scroll", () => {
        if (window.scrollY < 50) {
            header1.style.top = "0";
        }
    });
</script>
</body>
</html>
